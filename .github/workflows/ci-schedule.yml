name: Schedule CI Workflow

on:
  schedule:
    - cron: "0 0 * * 6"

concurrency:
  group: gh-ref-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check_last_commit:
    runs-on: ubuntu-latest
    name: Check latest commit
    outputs:
      should_run: ${{ steps.should_run.outputs.should_run }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: should_run
        continue-on-error: true
        name: Check latest commit is less than a day
        if: ${{ github.event_name == 'schedule' }}
        run: test -z $(git rev-list --after="24 hours" ${{ github.sha }}) && echo "should_run=false" >> "$GITHUB_OUTPUT"

  flake-inputs-update:
    needs: [check_last_commit]
    if: ${{ needs.check_last_commit.outputs.should_run != 'false' }}
    uses: ./.github/workflows/flake-inputs-update.yml
    secrets: inherit

  build-and-push:
    needs: [check_last_commit, flake-inputs-update]
    if: ${{ needs.check_last_commit.outputs.should_run != 'false' && needs.flake-inputs-update.result == 'success' }}
    uses: ./.github/workflows/flake-builds.yml
    secrets: inherit

